_target_: src.models.vicon.vicon_transformer_video.ViconTransformerVideoModel

# Pretrained VICON backbone. The transformer is the video core; the wrapper trains
# the prompt adapters and decoder around it by default.
backbone:
  _target_: src.models.vicon.vicon.Vicon

  patch_resolution: 16
  patch_num_in: 8
  patch_num_out: 8
  ex_num: 9
  short_num_min: 1
  dim_channel: 7
  dim_token: 1024

  transformer:
    _target_: src.models.base.transformer.TransformerEncoder
    layer:
      _target_: src.models.base.transformer.TransformerEncoderLayer
      d_model: 1024
      nhead: 8
      dim_feedforward: 2048
      dropout: 0.0
    num_layers: 10

backbone_ckpt_path: ${paths.data_dir}/pretrained/vicon.pth
backbone_strict: true

# Default overnight setting: freeze the pretrained VICON transformer and train the
# VICON input adapters/position embeddings plus the new dense decoder.
freeze_transformer: true
freeze_backbone_adapters: false

# 8x8 VICON hidden map -> 512x512 velocity image. Fewer stages still works because
# the decoder interpolates to the requested target size at the end.
decoder_channels: [512, 256, 128, 64, 32, 16]
output_channels: 2
