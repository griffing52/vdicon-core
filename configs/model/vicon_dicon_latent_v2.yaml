_target_: src.models.vicon.vicon_latent_dicon_v2.ViconLatentDICONV2

backbone:
  _target_: src.models.vicon.vicon.Vicon

  patch_resolution: 64
  patch_num_in: 8
  patch_num_out: 8
  ex_num: ${data.ex_num}
  short_num_min: 1
  dim_channel: 2
  dim_token: 256

  transformer:
    _target_: src.models.base.transformer.TransformerEncoder
    layer:
      _target_: src.models.base.transformer.TransformerEncoderLayer
      d_model: 256
      nhead: 8
      dim_feedforward: 1024
      dropout: 0.0
    num_layers: 6

flow_expert:
  _target_: src.models.vicon.vicon_latent_dicon_v2.ResidualLatentFlowMatchingExpert
  target_channels: 2
  cond_channels: ${model.backbone.dim_token}
  base_channels: 192
  time_channels: 256

loss_time_weight: 1.5
loss_time_power: 2.0